apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: dixit.rathi@refactorq.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      # HTTP-01 challenge solver (most common)
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: main-gateway
                namespace: nginx-gateway
