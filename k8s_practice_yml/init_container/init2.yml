apiVersion: v1
kind: Pod
metadata:
  name: init-demo
  namespace: test
spec:
  initContainers:
  - name: init-create-file
    image: busybox
    command:
      - sh
      - -c
      - echo "Hello from init container" > /work/message.txt
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    volumeMounts:
    - name: shared-data
      mountPath: /work

  containers:
  - name: main-container
    image: busybox
    command:
      - sh
      - -c
      - cat /work/message.txt && sleep 3600
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    volumeMounts:
    - name: shared-data
      mountPath: /work

  volumes:
  - name: shared-data
    emptyDir: {}
