apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app1-proj-app
  namespace: argo-cd
spec:
  project: app1-project
  source:
    repoURL: https://github.com/dixitrathi7/GitOps_K8s_manifest.git
    targetRevision: HEAD
    path: custom-project
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true