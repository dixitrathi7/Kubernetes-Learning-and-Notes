---

apiVersion: v1
kind: Service
metadata:
  name: hotstarsvc
  namespace: test
spec:
  type: NodePort
  selector:
    app: hotstarapp
  ports:
  - port: 8081
    targetPort: 80
    nodePort: 31000     # Optional: specify the node port (range: 30000-32767) 
