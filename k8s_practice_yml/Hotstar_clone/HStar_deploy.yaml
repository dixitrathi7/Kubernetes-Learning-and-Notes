apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotstar-deployment
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotstarapp
  template:
    metadata:
      labels:
        app: hotstarapp
    spec:
      containers:
      - name: hotstarcontainer
        image: nginx
        resources:
          requests:
            memory: "150Mi"
            cpu: "250m"
          limits:
            memory: "200Mi"
            cpu: "500m"
        ports:
        - containerPort: 80

