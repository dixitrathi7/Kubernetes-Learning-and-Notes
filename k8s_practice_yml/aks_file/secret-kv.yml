apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-secrets
  namespace: test
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    useWorkloadIdentity: "true"
    clientID: "ce6ec858-2c40-4fff-a3c0-ae1e18c39173" # optional, omit if system-assigned

    keyvaultName: "kv-zohobackend-backend"
    tenantId: "60d07259-90f0-4488-94de-59a66077488d"

    objects: |
      array:
        - |
          objectName: secret-sauce
          objectType: secret              # secret | key | cert
          objectVersion: ""              # optional, latest if empty

--- 

apiVersion: v1
kind: ServiceAccount
metadata:
  name: zoho-service-account
  namespace: test
  annotations:
    azure.workload.identity/client-id: ce6ec858-2c40-4fff-a3c0-ae1e18c39173

---

apiVersion: v1
kind: Pod
metadata:
  name: kv-test-pod
  namespace: test
spec:
  serviceAccountName: zoho-service-account
  containers:
    - name: app
      image: busybox
      command: ["/bin/sh", "-c", "cat /mnt/secrets/secret-sauce && sleep 3600"]
      volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets"
          readOnly: true
  volumes:
    - name: secrets-store
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: azure-keyvault-secrets
