apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodbapp
  template:
    metadata:
      labels:
        app: mongodbapp 
    spec:
      containers:
      - name: mongocontainer
        image: mongo
        ports:
        - containerPort: 27017